<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DigitalRift</title>
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at top, #1a1a28 0%, #050610 70%);
            color: #e0e0e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
        }
        .card {
            text-align: center;
            padding: 48px;
            max-width: 480px;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin: 0 0 8px;
            background: linear-gradient(135deg, #3ab0ff 0%, #ffc850 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { margin: 8px 0; opacity: 0.7; }
        a { color: #3ab0ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>DigitalRift</h1>
        <p>Coming soon.</p>
        <p><small>Downloads land here once the first release ships.</small></p>
    </div>
</body>
</html>
